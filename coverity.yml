# Coverity Configuration File
# Configure Coverity static analysis settings for this Java project

# Build configuration
build:
  # Build command to compile the project
  build_cmd: "mvn clean compile -DskipTests"
  
  # Clean command before build
  clean_cmd: "mvn clean"
  
  # Directory for intermediate files
  intermediate_dir: "cov-int"

# Analysis configuration  
analysis:
  # Analysis type
  type: "java"
  
  # Enable security analysis
  security_analysis: true
  
  # Enable quality analysis
  quality_analysis: true
  
  # Checkers to enable (leaving empty enables all default checkers)
  checkers:
    - RESOURCE_LEAK
    - NULL_RETURNS
    - SQL_INJECTION
    - COMMAND_INJECTION
    - PATH_MANIPULATION
    - HARDCODED_CREDENTIALS
    - INSECURE_RANDOM
    - STACK_TRACE_EXPOSURE
    
  # Severity threshold for failing builds
  fail_on_severity: "high"

# Project settings
project:
  name: "coverity-java-demo"
  version: "1.0.0"
  
  # Source directories
  source_dirs:
    - "src/main/java"
    
  # Test directories (excluded from analysis)
  test_dirs:
    - "src/test/java"
    
  # Exclude patterns
  exclude_patterns:
    - "**/generated/**"
    - "**/target/**"

# Reporting configuration
reporting:
  # Output format
  format: "json"
  
  # Output file
  output_file: "coverity-report.json"
  
  # Include metrics
  include_metrics: true
