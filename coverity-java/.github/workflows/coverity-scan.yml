name: Coverity Scan

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

env:
  COVERITY_PROJECT: potterhead019/coverity-java
  JAVA_VERSION: '17'

jobs:
  coverity-scan:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build with Maven
        run: mvn clean compile -DskipTests

      - name: Download Coverity Build Tool
        run: |
          curl -fsS --data-urlencode "token=${{ secrets.COVERITY_TOKEN }}" \
               --data-urlencode "project=${{ env.COVERITY_PROJECT }}" \
               -o coverity.tar.gz \
               https://scan.coverity.com/download/java/linux64
          mkdir -p cov-tools
          tar -xzf coverity.tar.gz -C cov-tools --strip-components=1

      - name: Run Coverity Build
        run: |
          export PATH=$PATH:$(pwd)/cov-tools/bin
          cov-build --dir cov-int mvn clean compile -DskipTests

      - name: Submit to Coverity Scan
        run: |
          tar czvf coverity-scan.tar.gz cov-int
          curl --form token=${{ secrets.COVERITY_TOKEN }} \
               --form email=${{ secrets.COVERITY_EMAIL }} \
               --form file=@coverity-scan.tar.gz \
               --form version="${{ github.sha }}" \
               --form description="Build from ${{ github.ref_name }}" \
               https://scan.coverity.com/builds?project=${{ env.COVERITY_PROJECT }}
