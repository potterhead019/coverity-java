# CodeQL GitHub Actions Workflow
# GitHub's native static analysis engine - FREE for public repos

name: CodeQL Analysis

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  schedule:
    # Run weekly on Sundays at midnight UTC
    - cron: '0 0 * * 0'
  workflow_dispatch:  # Allow manual trigger

jobs:
  analyze:
    name: CodeQL Analysis
    runs-on: ubuntu-latest
    
    permissions:
      actions: read
      contents: read
      security-events: write

    strategy:
      fail-fast: false
      matrix:
        language: ['java']
        # Add more languages if needed:
        # language: ['java', 'javascript', 'python']

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
          # Use security-extended for more security queries
          queries: security-extended,security-and-quality

      # For compiled languages like Java, CodeQL needs to observe the build
      - name: Build with Maven
        run: mvn clean compile -DskipTests -B

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:${{ matrix.language }}"

  # Additional security queries job
  codeql-security:
    name: CodeQL Security Queries
    runs-on: ubuntu-latest
    
    permissions:
      actions: read
      contents: read
      security-events: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Initialize CodeQL with Custom Queries
        uses: github/codeql-action/init@v4
        with:
          languages: java
          queries: |
            security-extended
            security-and-quality
          # You can also add custom query packs:
          # packs: codeql/java-queries

      - name: Build with Maven
        run: mvn clean compile -DskipTests -B

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: "security-extended"
          output: codeql-results
          upload: true

      - name: Upload CodeQL Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: codeql-results
          path: codeql-results
          retention-days: 30
