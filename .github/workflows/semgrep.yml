# Semgrep SAST GitHub Actions Workflow
# Free, fast, and open-source static analysis for security and code quality

name: Semgrep Scan

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  schedule:
    # Run weekly on Sundays at midnight UTC
    - cron: '0 0 * * 0'
  workflow_dispatch:  # Allow manual trigger

jobs:
  semgrep:
    name: Semgrep Security Scan
    runs-on: ubuntu-latest
    
    container:
      image: semgrep/semgrep
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run Semgrep Scan
        run: |
          semgrep scan \
            --config auto \
            --config p/security-audit \
            --config p/java \
            --config p/owasp-top-ten \
            --json \
            --output semgrep-results.json \
            .
        continue-on-error: true

      - name: Run Semgrep (Text Output)
        run: |
          semgrep scan \
            --config auto \
            --config p/security-audit \
            --config p/java \
            --config p/owasp-top-ten \
            .

      - name: Upload Semgrep Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: semgrep-results
          path: semgrep-results.json
          retention-days: 30

  # Alternative: Semgrep with SARIF for GitHub Security tab
  semgrep-sarif:
    name: Semgrep SARIF Upload
    runs-on: ubuntu-latest
    
    permissions:
      contents: read
      security-events: write
    
    container:
      image: semgrep/semgrep
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run Semgrep with SARIF output
        run: |
          semgrep scan \
            --config auto \
            --config p/security-audit \
            --config p/java \
            --config p/owasp-top-ten \
            --sarif \
            --output semgrep-results.sarif \
            .
        continue-on-error: true

      - name: Upload SARIF to GitHub Security
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: semgrep-results.sarif
