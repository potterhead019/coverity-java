# Snyk Code SAST GitHub Actions Workflow
# Developer-friendly security scanning with fast feedback

name: Snyk Code Scan

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  schedule:
    # Run weekly on Sundays at midnight UTC
    - cron: '0 0 * * 0'
  workflow_dispatch:  # Allow manual trigger

jobs:
  snyk-code:
    name: Snyk Code Security Scan
    runs-on: ubuntu-latest
    
    permissions:
      contents: read
      security-events: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Snyk CLI
        uses: snyk/actions/setup@master

      - name: Authenticate Snyk
        run: snyk auth ${{ secrets.SNYK_TOKEN }}
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

      - name: Run Snyk Code Scan
        run: |
          snyk code test --sarif-file-output=snyk-code-results.sarif || true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        continue-on-error: true

      - name: Run Snyk Code (Text Output)
        run: |
          snyk code test || true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

      - name: Upload SARIF to GitHub Security
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: snyk-code-results.sarif

      - name: Upload Snyk Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: snyk-code-results
          path: snyk-code-results.sarif
          retention-days: 30

  # Snyk Open Source - Check dependencies for vulnerabilities
  snyk-dependencies:
    name: Snyk Dependency Scan
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Set up Snyk CLI
        uses: snyk/actions/setup@master

      - name: Run Snyk Open Source Scan
        run: |
          snyk test --all-projects --json-file-output=snyk-deps-results.json || true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

      - name: Run Snyk Monitor (upload to Snyk dashboard)
        run: |
          snyk monitor --all-projects || true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        if: github.ref == 'refs/heads/main'

      - name: Upload Snyk Dependency Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: snyk-dependency-results
          path: snyk-deps-results.json
          retention-days: 30
